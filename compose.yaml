services:
  db:
    image: postgres:17
    container_name: qcodingtest-db
    environment:
      POSTGRES_DB: qcodingtest
      POSTGRES_USER: qcodingtest
      POSTGRES_PASSWORD: qcodingtest
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcodingtest -d qcodingtest"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
