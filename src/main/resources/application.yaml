spring:
  application:
    name: qcodingtest
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qcodingtest}
    username: ${SPRING_DATASOURCE_USERNAME:qcodingtest}
    password: ${SPRING_DATASOURCE_PASSWORD:qcodingtest}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: POSTGRES
  mvc:
    # 400 系（入力形式違反）のボディを標準の ProblemDetail(RFC7807) で返し、エラー内容を可視化する。
    problemdetails:
      enabled: true
